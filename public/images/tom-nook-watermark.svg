<svg xmlns="http://www.w3.org/2000/svg" width="100" height="110" viewBox="0 0 100 110">
  <!-- Ears -->
  <circle cx="24" cy="34" r="15" fill="#7d5a50"/>
  <circle cx="76" cy="34" r="15" fill="#7d5a50"/>
  <!-- Inner ears -->
  <circle cx="24" cy="34" r="8" fill="#c4926a"/>
  <circle cx="76" cy="34" r="8" fill="#c4926a"/>
  <!-- Head -->
  <circle cx="50" cy="70" r="32" fill="#7d5a50"/>
  <!-- Face patch -->
  <ellipse cx="50" cy="72" rx="22" ry="19" fill="#c4926a"/>
  <!-- Eye patches (raccoon mask) -->
  <ellipse cx="37" cy="63" rx="12" ry="10" fill="#4a3020"/>
  <ellipse cx="63" cy="63" rx="12" ry="10" fill="#4a3020"/>
  <!-- Eyes -->
  <circle cx="37" cy="64" r="5" fill="white"/>
  <circle cx="63" cy="64" r="5" fill="white"/>
  <!-- Pupils -->
  <circle cx="38" cy="65" r="3" fill="#1a0a00"/>
  <circle cx="64" cy="65" r="3" fill="#1a0a00"/>
  <!-- Eye shine -->
  <circle cx="39" cy="63" r="1.2" fill="white"/>
  <circle cx="65" cy="63" r="1.2" fill="white"/>
  <!-- Nose -->
  <ellipse cx="50" cy="75" rx="5" ry="3.5" fill="#3d2010"/>
  <!-- Mouth -->
  <path d="M43 82 Q50 89 57 82" fill="none" stroke="#3d2010" stroke-width="2" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="26" y1="73" x2="44" y2="76" stroke="#3d2010" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="26" y1="78" x2="44" y2="78" stroke="#3d2010" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Whiskers right -->
  <line x1="74" y1="73" x2="56" y2="76" stroke="#3d2010" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="74" y1="78" x2="56" y2="78" stroke="#3d2010" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Leaf -->
  <path d="M50 22 C46 13 36 8 40 2 C44 -4 62 4 58 20 Z" fill="#5a9a40"/>
  <line x1="50" y1="22" x2="50" y2="38" stroke="#5a9a40" stroke-width="2" stroke-linecap="round"/>
</svg>
